  bootstrap: 5
  bslib:
    base_font: {google: "IBM Plex Sans"}
    heading_font: {google: "IBM Plex Sans"}
    code_font: {google: "IBM Plex Mono"}

reference:
  - title: "Permits"
    desc: Main permits table from the NYC Mayor's Office of Media and Entertainment.
    contents:
      - nyc_film_permits_df
